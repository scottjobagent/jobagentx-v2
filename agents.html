<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobAgentX — Agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3f2ef;--text:#2d2d2d;--muted:#595959;--line:#d4d2d0;--line-soft:#e7e5e1;
  --sidebar:#2d2d2d;--blue:#0044b3;--blue-dark:#003a99;--dark:#1a1a1a;--panel:#fff;
  --th-bg:#fafaf8;--green:#1a7f4b;--green-bg:#e6f4ec;--amber:#b7791f;--amber-bg:#fdf6e3;--red:#c0392b;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans",-apple-system,system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
h1{font-size:24px;font-weight:700;margin:0}
h2{font-size:20px;font-weight:700;margin:0}
h3{font-size:16px;font-weight:700;margin:0}
.app{display:flex;min-height:100vh;align-items:flex-start}
/* sidebar */
.sidebar{width:248px;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;padding:16px 14px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:20}
.sb-collapse{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.7);font-size:12.5px;font-weight:600;padding:7px 10px;cursor:pointer;margin-bottom:12px}
.sb-collapse .xi{font-size:15px;font-weight:400}
.sb-nav{display:flex;flex-direction:column;gap:4px}
.sb-nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;color:rgba(255,255,255,.82);font-size:14px;font-weight:500}
.sb-nav a:hover{background:rgba(255,255,255,.09);color:#fff}
.sb-nav a.active{background:rgba(255,255,255,.18);color:#fff;font-weight:700}
.sb-nav .ic{width:18px;text-align:center;font-size:14.5px}
/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column;margin-left:248px}
.topbar{display:flex;justify-content:flex-end;align-items:center;padding:16px 34px;background:transparent}
.topbar .user{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--text)}
.topbar .ava{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.wrap{padding:30px 34px 60px;max-width:1240px;width:100%}
/* buttons */
.btn{font-family:inherit;font-size:16px;font-weight:700;border:none;border-radius:8px;padding:12px 24px;cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;line-height:1.2}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--blue-dark)}
.btn-dark{background:var(--dark);color:#fff}
.btn-dark:hover{background:#000}
.btn-ghost{background:#fff;color:var(--text);border:1px solid var(--line)}
.btn-ghost:hover{border-color:#9a9a9a}
.btn-sm{font-size:13px;padding:8px 14px;border-radius:7px}
.btn-xs{font-size:12.5px;padding:6px 12px;border-radius:6px;font-weight:600}
.btn-accept{background:var(--blue);color:#fff}
.btn-line{background:#fff;border:1px solid var(--line);color:var(--text)}
.btn-line:hover{border-color:#9a9a9a}
/* page head */
.head-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px 32px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.head-card .co{font-size:24px;font-weight:700;color:var(--text);line-height:1.2}
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:16px}
.page-head .co{font-size:24px;font-weight:700}
/* tabs (pill) */
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{background:transparent;border:none;font-family:inherit;font-size:14px;font-weight:700;color:var(--muted);padding:12px 24px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px}
.tab .cnt{font-weight:600;opacity:.7}
.tab.active{background:var(--text);color:#fff}
.tab:not(.active):hover{background:#eceae6}
.spacer{flex:1}
/* dropdown look */
.select{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;color:var(--blue)}
.select .ca{color:var(--muted);font-size:11px}
/* banner */
.banner{background:var(--amber-bg);border:1px solid #f0e2b8;border-radius:12px;padding:18px 22px;display:flex;align-items:center;gap:18px;margin-bottom:22px}
.banner .clock{width:42px;height:42px;border-radius:50%;background:#f6e7bd;color:#b7791f;display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 42px}
.banner .bt{flex:1}
.banner .bt h4{margin:0 0 3px;font-size:15px;font-weight:700;color:#5a4a1a}
.banner .bt p{margin:0;font-size:13px;color:#7a6a3a}
.banner-multi{flex-direction:column;align-items:stretch}
.banner-multi .head{display:flex;align-items:center;gap:18px}
.bm-rows{margin-top:14px;display:flex;flex-direction:column;gap:0;border-top:1px solid #f0e2b8}
.bm-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f0e2b8}
.bm-row:last-child{border-bottom:none}
.bm-row .l{font-size:14px}.bm-row .l b{font-weight:700}
.bm-row .d{font-size:12.5px;color:#7a6a3a;margin-top:1px}
.bm-row .r{display:flex;align-items:center;gap:18px}
.bm-row .aw{font-size:13px;font-weight:700;color:#b7791f}
.bm-row a{color:var(--blue);font-weight:700;font-size:13.5px}
/* panel + table */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:16px 22px;background:var(--th-bg);text-align:left;border-bottom:1px solid var(--line)}
tbody td{font-size:14px;color:var(--text);padding:22px;border-bottom:1px solid var(--line-soft);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
.link{color:var(--blue);font-weight:600}
.link:hover{text-decoration:underline}
.muted{color:var(--muted)}
.sub{color:var(--muted);font-size:13px}
.small{font-size:12.5px;color:var(--muted)}
.strong{font-weight:700}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mt6{margin-top:6px}.mt10{margin-top:10px}
/* status chip */
.chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;letter-spacing:.02em}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip.active{background:var(--green-bg);color:var(--green)}
.chip.active .dot{background:var(--green)}
.chip.sourcing{background:#fef3da;color:var(--amber)}
.chip.sourcing .dot{background:var(--amber)}
.chip.paused{background:#eeecea;color:var(--muted)}
.chip.paused .dot{background:var(--muted)}
.status-line{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--green);font-weight:600}
.status-line .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.status-line.amber{color:var(--amber)}.status-line.amber .dot{background:var(--amber)}
/* actions cell icons */
.act{display:flex;flex-direction:column;gap:8px}
.act .row{display:flex;gap:8px}
.iconbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text)}
.iconbtn:hover{border-color:#9a9a9a}
/* candidate cell */
.cand-count{font-size:14px}
.cand-count .awaiting{color:var(--red);font-weight:700;display:inline-flex;align-items:center;gap:6px}
.cand-count .awaiting .dot{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block}
.dotmark{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px}
/* avatar */
.ava-c{width:40px;height:40px;border-radius:50%;background:#e7e5e1;color:#555;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:0 0 40px}
.namecell{display:flex;align-items:flex-start;gap:13px}
.namecell .nm{font-weight:700}
.namecell .links{margin-top:4px;display:flex;gap:14px}
.namecell .links a{color:var(--blue);font-size:13px}
/* sub-tabs (underline) */
.subtabs{display:flex;gap:30px;border-bottom:1px solid var(--line);margin-bottom:0}
.subtab{padding:14px 2px;font-size:15px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;display:flex;align-items:center;gap:8px}
.subtab .cnt{background:#eceae6;color:var(--muted);font-size:12px;font-weight:700;padding:1px 8px;border-radius:10px}
.subtab.active{color:var(--text);border-bottom-color:var(--text)}
.subtab.active .cnt{background:var(--text);color:#fff}
/* form */
.field{margin-bottom:22px}
label.lbl{display:block;font-size:14px;font-weight:700;margin-bottom:7px}
input[type=text],input[type=time],textarea,select.inp{width:100%;font-family:inherit;font-size:14px;color:var(--text);background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px;outline:none}
input:focus,textarea:focus,select.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,68,179,.12)}
textarea{resize:vertical;min-height:130px;line-height:1.55}
.hint{font-size:12.5px;color:var(--muted);margin-top:6px}
.wiz-steps{display:flex;align-items:center;margin:4px 0 26px}
.wiz-step{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--muted)}
.wiz-step .n{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:13px;background:#fff}
.wiz-step.active{color:var(--text)}.wiz-step.active .n{background:var(--blue);border-color:var(--blue);color:#fff}
.wiz-step.done{color:var(--text)}.wiz-step.done .n{background:var(--green);border-color:var(--green);color:#fff}
.wiz-sep{flex:1;height:1.5px;background:var(--line);margin:0 14px}
.wiz-foot{display:flex;justify-content:space-between;margin-top:26px}
.row2{display:flex;gap:14px}.row2>*{flex:1}
.mh{display:flex;flex-direction:column;gap:9px}
.mh-item{display:flex;gap:8px;align-items:center}
.mh-item .x{color:var(--muted);cursor:pointer;font-size:18px;padding:2px 8px;border-radius:6px}
.mh-item .x:hover{color:var(--red);background:#fbeeec}
.addlink{color:var(--blue);font-weight:700;font-size:13.5px;cursor:pointer;display:inline-block;margin-top:4px}
.jd-box{position:relative}.jd-gen{position:absolute;top:10px;right:10px}
.drafting{display:flex;align-items:center;gap:9px;color:var(--blue);font-weight:600;font-size:13.5px;padding:14px}
/* interviewer chips */
.ivchips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:10px}
.ivchip{display:flex;align-items:center;gap:9px;background:#f5f4f1;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13.5px}
.ivchip .x{color:var(--muted);cursor:pointer}.ivchip .x:hover{color:var(--red)}
.ivchip .owner{font-size:11px;color:var(--muted)}
/* availability */
.avail{display:flex;flex-direction:column;gap:9px}
.day{display:flex;align-items:center;gap:14px;padding:11px 14px;border:1px solid var(--line);border-radius:10px;background:#fff}
.day.off{background:var(--th-bg);color:var(--muted)}
.day .dn{width:42px;font-weight:700}
.day .times{margin-left:auto;display:flex;align-items:center;gap:9px}
.day .times input{width:120px}
.day.off .times{opacity:.4;pointer-events:none}
.toggle{position:relative;width:42px;height:24px;flex:0 0 42px}
.toggle input{opacity:0;width:0;height:0}
.toggle .tk{position:absolute;inset:0;background:#cfccc6;border-radius:20px;cursor:pointer;transition:.15s}
.toggle .tk:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
.toggle input:checked+.tk{background:var(--blue)}
.toggle input:checked+.tk:before{transform:translateX(18px)}
.tag{display:inline-block;background:#f1efea;border:1px solid var(--line);font-size:12.5px;padding:5px 11px;border-radius:20px;margin:0 6px 6px 0}
.review-row{padding:15px 0;border-bottom:1px solid var(--line-soft)}
.review-row:last-child{border-bottom:none}
.review-row .k{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:5px}
/* back link */
.back{display:inline-flex;align-items:center;gap:8px;color:var(--blue);font-weight:700;font-size:14px;margin-bottom:14px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(20,20,20,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:28px;width:100%;max-width:480px;box-shadow:0 30px 70px -20px rgba(0,0,0,.4)}
.modal h3{font-size:19px;margin-bottom:8px}
.modal p{color:var(--muted);font-size:14px;margin:0 0 16px}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
/* room header */
.room-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:16px}
.room-meta{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:14px;margin-bottom:22px}
.kpis{display:flex;gap:14px;margin-bottom:24px}
.kpi{flex:1;background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.kpi .n{font-size:28px;font-weight:800;color:var(--text)}
.kpi .l{font-size:13px;color:var(--muted);margin-top:3px}
/* messaging */
.msg-layout{display:grid;grid-template-columns:340px 1fr;gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff;min-height:560px}
.msg-list{border-right:1px solid var(--line);display:flex;flex-direction:column}
.msg-search{padding:14px;border-bottom:1px solid var(--line-soft)}
.msg-search input{width:100%}
.conv{padding:14px 16px;border-bottom:1px solid var(--line-soft);cursor:pointer}
.conv:hover{background:var(--th-bg)}
.conv.active{background:#eef3fb;border-left:3px solid var(--blue)}
.conv .top{display:flex;justify-content:space-between}
.conv .nm{font-weight:700}.conv .tm{font-size:12px;color:var(--muted)}
.conv .role{font-size:12.5px;color:var(--muted);margin:2px 0 4px}
.conv .pv{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thread{display:flex;flex-direction:column}
.thread-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.thread-body{flex:1;padding:20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:420px}
.bub{max-width:74%;padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.45}
.bub.me{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.bub.them{align-self:flex-start;background:#f0eee9;border-bottom-left-radius:4px}
.thread-input{display:flex;gap:9px;padding:14px 20px;border-top:1px solid var(--line)}
.thread-input input{flex:1}
.empty{padding:60px 20px;text-align:center;color:var(--muted)}
@media(max-width:900px){.msg-layout{grid-template-columns:1fr}.sidebar{display:none}.main{margin-left:0}.wrap,.topbar{padding-left:18px;padding-right:18px}}

/* dashboard actions status line (matches "Setup complete") */
.setup-line{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text);font-weight:400;margin-top:10px}
.setup-line .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.setup-line .dot.green{background:var(--green)}
.setup-line .dot.amber{background:var(--amber)}
.setup-line .dot.gray{background:var(--muted)}
/* pagination */
.pager{display:flex;align-items:center;justify-content:center;gap:18px;padding:20px;color:var(--muted);font-size:14px}
.pager .pg{display:flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 12px;border-radius:6px;font-size:13px}
.pager .pg.cur{background:var(--text);color:#fff;font-weight:600}
.pager .nav{color:var(--muted)}
/* banner state pill (matches BANNER 1 2) */
.bpill{display:inline-flex;align-items:center;gap:4px;background:var(--text);border-radius:22px;padding:6px 8px}
.bpill .bl{color:rgba(255,255,255,.65);font-size:12px;font-weight:700;letter-spacing:.06em;padding:0 8px}
.bpill .bn{min-width:26px;height:26px;padding:0 10px;border-radius:13px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,.7);cursor:pointer;border:none;background:transparent}
.bpill .bn.on{background:#fff;color:var(--text)}
.bcenter{display:flex;justify-content:center;margin-top:26px}

/* sidebar collapse */
.sb-collapse .xi-open{display:none}
.app.collapsed .sidebar{width:66px;padding:16px 10px}
.app.collapsed .main{margin-left:66px}
.app.collapsed .sb-collapse{justify-content:center;gap:0}
.app.collapsed .sb-collapse .cl-label{display:none}
.app.collapsed .sb-collapse .xi-close{display:none}
.app.collapsed .sb-collapse .xi-open{display:inline}
.app.collapsed .sb-nav a{justify-content:center;padding:11px 0;gap:0}
.app.collapsed .sb-nav .lbl{display:none}

/* ===== Create Agent setup flow (matches JobFairX setup-flow-v3) ===== */
.setup-wrap{max-width:780px}
.setup-h1{font-size:36px;font-weight:700;color:var(--text);margin:8px 0 40px;line-height:1.15}
.req{color:#991b1b;margin-left:3px}
.setup-q{font-size:16px;font-weight:700;color:var(--text);margin:0 0 16px}
.setup-divider{border:none;border-top:1px solid var(--line);margin:34px 0}
.setup-field{margin-bottom:30px}
.setup-label{display:block;font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}
.setup-hint{font-size:14px;color:var(--muted);margin:0 0 8px}
.setup-input{width:100%;font-family:inherit;font-size:16px;color:var(--text);background:#fff;border:2px solid #a8a8a8;border-radius:10px;padding:14px 20px;outline:none;transition:border-color .12s}
.setup-input::placeholder{color:#9a9a9a}
.setup-input:focus{border-color:var(--blue)}
.setup-selectwrap{position:relative}
.setup-selectwrap .chev{position:absolute;right:18px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:13px}
select.setup-input{appearance:none;-webkit-appearance:none;padding-right:44px;cursor:pointer}
/* radio options */
.opt{display:flex;align-items:flex-start;gap:13px;padding:9px 0;cursor:pointer}
.opt input[type=radio]{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:2px solid #a8a8a8;border-radius:50%;margin:1px 0 0;flex:0 0 20px;cursor:pointer;position:relative}
.opt input[type=radio]:checked{border-color:var(--blue)}
.opt input[type=radio]:checked:after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:var(--blue);left:3px;top:3px}
.opt .ot{font-size:16px;color:var(--text)}
.save-badge{display:inline-block;background:#e8f5e9;color:#2d7a2d;font-size:12px;font-weight:700;border-radius:4px;padding:3px 9px;margin-top:6px}
/* combobox */
.combo{position:relative}
.combo-list{position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 12px 30px -12px rgba(0,0,0,.25);z-index:20;max-height:260px;overflow-y:auto;display:none}
.combo-list.show{display:block}
.combo-list .ci{padding:11px 18px;font-size:15px;cursor:pointer}
.combo-list .ci:hover,.combo-list .ci.active{background:var(--th-bg)}
/* previous-agent template list */
.tmpl-list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.tmpl{border:2px solid var(--line);border-radius:10px;padding:14px 18px;cursor:pointer;transition:.12s}
.tmpl:hover{border-color:#a8a8a8}
.tmpl.sel{border-color:var(--blue);background:#f5f8ff}
.tmpl .tt{font-weight:700;font-size:15px}
.tmpl .ts{font-size:13px;color:var(--muted);margin-top:2px}
.err{color:#991b1b;font-size:13.5px;margin-top:8px;display:none}
.err.show{display:block}
.btn-lg{padding:14px 32px;font-size:16px}
.setup-foot{display:flex;justify-content:flex-end;margin-top:36px}

/* ===== Create Agent flow — additional step components ===== */
.setup-progress{display:flex;align-items:center;gap:0;margin:2px 0 30px;flex-wrap:wrap}
.pstep{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;font-weight:600}
.pstep .pn{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;background:#fff}
.pstep.active{color:var(--text)}.pstep.active .pn{background:var(--blue);border-color:var(--blue);color:#fff}
.pstep.done{color:var(--text)}.pstep.done .pn{background:var(--green);border-color:var(--green);color:#fff}
.pline{width:26px;height:2px;background:var(--line);margin:0 10px}
.section-err{color:#991b1b;font-size:14px;margin:4px 0 10px;display:none}
.section-err.show{display:block}
/* checkbox/radio option grids */
.optgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 24px;margin-top:4px}
.optgrid.one{grid-template-columns:1fr}
.checkopt{display:flex;align-items:center;gap:11px;cursor:pointer;font-size:15px;padding:6px 0}
.checkopt input{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:2px solid #a8a8a8;border-radius:5px;flex:0 0 20px;cursor:pointer;position:relative}
.checkopt input:checked{background:var(--blue);border-color:var(--blue)}
.checkopt input:checked:after{content:'';position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
/* pay */
.pay-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.pay-col{flex:1;min-width:150px}
.pay-amt{position:relative}
.pay-amt .dollar{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted)}
.pay-amt input{padding-left:30px}
/* AI description */
.jd-tool{display:flex;gap:6px;border:2px solid #a8a8a8;border-bottom:none;border-radius:10px 10px 0 0;padding:8px 12px;background:#faf8f3}
.jd-tool b,.jd-tool i{width:30px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;font-size:15px}
.jd-tool b:hover,.jd-tool i:hover{background:#ece8e0}
.jd-area{border:2px solid #a8a8a8;border-radius:0 0 10px 10px;padding:16px 18px;min-height:220px;font-size:15px;line-height:1.6;outline:none}
.jd-area:focus{border-color:var(--blue)}
.jd-area h4{font-size:15px;margin:14px 0 6px}
.ai-note{font-size:12.5px;color:var(--muted);margin-top:10px;font-style:italic}
.notice{background:#fdf6e3;border:1px solid #f0e2b8;border-radius:10px;padding:16px 18px;margin-top:20px;font-size:13.5px;color:#5a4a1a;line-height:1.55}
.notice b{color:#3d2c1e}
.ack{display:flex;align-items:flex-start;gap:11px;margin-top:14px;font-size:14px;cursor:pointer}
.ack input{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:2px solid #a8a8a8;border-radius:5px;flex:0 0 20px;cursor:pointer;position:relative;margin-top:1px}
.ack input:checked{background:var(--blue);border-color:var(--blue)}
.ack input:checked:after{content:'';position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
/* review tables */
.rev-table{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.rev-table td{padding:14px 18px;border-bottom:1px solid var(--line-soft);font-size:14px;vertical-align:top}
.rev-table tr:last-child td{border-bottom:none}
.rev-table td.k{width:200px;color:var(--muted);font-weight:600;background:var(--th-bg)}
.rev-h{font-size:18px;font-weight:700;margin:0 0 14px}
/* interview settings rows */
.iset{border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:14px}
.iset .it{font-weight:700;font-size:15px;margin-bottom:4px}
.iset .id{font-size:13px;color:var(--muted);margin-bottom:12px}
.iset-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
.email-chips{display:flex;flex-wrap:wrap;gap:9px;margin:8px 0}
.email-chip{display:flex;align-items:center;gap:9px;background:#f5f4f1;border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13.5px}
.email-chip .x{color:var(--muted);cursor:pointer}.email-chip .x:hover{color:#991b1b}
.estimate{background:#eef3fb;border:1px solid #cfdcf0;border-radius:8px;padding:11px 14px;font-size:13.5px;color:var(--ink-2);margin-top:8px}
/* screening empty */
.screen-empty{border:1px dashed var(--line);border-radius:10px;padding:24px;text-align:center;color:var(--muted)}
.screen-job{border:1px solid var(--line);border-radius:10px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
.modal select.setup-input,.modal input.setup-input{font-size:15px;padding:11px 14px;border-width:1px;border-radius:8px}
.modal .setup-field{margin-bottom:16px}

/* ===== Activity feed, nudges, overview, candidate detail ===== */
/* per-agent nudge row on roster */
.nudge-row td{padding:0 22px 16px!important;border-bottom:1px solid var(--line-soft)}
.nudge{display:flex;align-items:center;gap:12px;border-radius:10px;padding:11px 14px;font-size:13.5px}
.nudge.accent{background:#eef3fb;border:1px solid #cfdcf0}
.nudge.muted{background:var(--th-bg);border:1px solid var(--line-soft);color:var(--muted)}
.nudge .nb{color:var(--blue);font-size:18px;flex:0 0 auto}
.nudge .nt{flex:1}.nudge.accent .nt b{color:var(--ink-3)}
.nudge .ns{color:var(--muted);font-size:12.5px}
.nudge a.act{color:var(--blue);font-weight:700;white-space:nowrap}
.nudge .btn{flex:0 0 auto}
/* activity feed */
.feed-h{font-size:13px;color:var(--muted);margin:0 0 6px;font-weight:600}
.feed{display:flex;flex-direction:column}
.feed-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.feed-item:last-child{border-bottom:none}
.feed-ic{width:30px;height:30px;border-radius:50%;flex:0 0 30px;display:flex;align-items:center;justify-content:center;background:var(--th-bg);color:var(--muted);font-size:15px}
.feed-ic.accent{background:#eef3fb;color:var(--blue)}
.feed-tx{flex:1;min-width:0}
.feed-tx .ft{font-size:14px}
.feed-tx .fs{font-size:12px;color:var(--muted);margin-top:1px}
.feed-time{font-size:12px;color:var(--muted);white-space:nowrap}
.feed-agent{font-size:12px;color:var(--blue);font-weight:600}
/* overview */
.ov-section{margin-bottom:30px}
.ov-h{font-size:18px;font-weight:700;color:var(--ink);margin:0 0 14px}
.needs{display:flex;flex-direction:column;gap:10px}
.need{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px}
.need.accent{border-color:#cfdcf0;background:#f7faff}
.need .ni{width:38px;height:38px;border-radius:10px;flex:0 0 38px;display:flex;align-items:center;justify-content:center;font-size:19px}
.need .ni.blue{background:#eef3fb;color:var(--blue)}
.need .ni.amber{background:#fdf6e3;color:var(--amber)}
.need .nx{flex:1}
.need .nx .t{font-weight:700;font-size:14.5px}
.need .nx .s{font-size:12.5px;color:var(--muted);margin-top:1px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:30px}
.mini-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.mini{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.13s}
.mini:hover{border-color:#d8cdbb;box-shadow:0 6px 20px -14px rgba(31,58,82,.3)}
.mini .top{display:flex;justify-content:space-between;align-items:flex-start}
.mini .role{font-weight:700;font-size:16px;color:var(--ink)}
.mini .loc{font-size:12.5px;color:var(--muted);margin-top:2px}
.mini .stats{display:flex;gap:18px;margin-top:14px}
.mini .stat .n{font-family:inherit;font-size:20px;font-weight:800;color:var(--ink)}
.mini .stat .l{font-size:11.5px;color:var(--muted)}
.mini .mininudge{margin-top:14px;font-size:12.5px;display:flex;align-items:center;gap:8px;color:var(--blue);font-weight:600}
.mini .mininudge.muted{color:var(--muted);font-weight:400}
.empty-hero{text-align:center;padding:70px 24px;background:#fff;border:1px dashed var(--line);border-radius:16px}
.empty-hero .eh{font-size:24px;font-weight:700;color:var(--ink);margin-bottom:8px}
.empty-hero .es{color:var(--muted);max-width:420px;margin:0 auto 22px}
/* candidate detail */
.cd-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:22px;align-items:start}
.cd-head{display:flex;align-items:center;gap:15px;margin-bottom:6px}
.cd-head .ava-c{width:54px;height:54px;font-size:19px;flex-basis:54px}
.cd-name{font-size:21px;font-weight:700;color:var(--ink)}
.cd-sub{font-size:13.5px;color:var(--muted)}
.cd-section{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin:20px 0 10px}
.cd-exp{padding:12px 0;border-bottom:1px solid var(--line-soft)}
.cd-exp:last-child{border-bottom:none}
.cd-exp .r{font-weight:700}.cd-exp .o{font-size:13px;color:var(--muted);margin:1px 0 4px}.cd-exp .n{font-size:13.5px}
.cd-scr{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px}
.cd-scr:last-child{border-bottom:none}
.cd-scr .a{color:var(--ink);font-weight:600;text-align:right}
.timeline{display:flex;flex-direction:column}
.tl{display:flex;gap:11px;padding:8px 0}
.tl .dot{width:9px;height:9px;border-radius:50%;background:var(--blue);margin-top:5px;flex:0 0 9px}
.tl .tt{font-size:13.5px}.tl .tm{font-size:12px;color:var(--muted)}

/* ===== Interviews lobby ===== */
.lobby-bar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding:14px 0 20px;border-bottom:1px solid var(--line);margin-bottom:0}
.avail{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.avail .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.avail .seg button{border:none;background:#fff;font-family:inherit;font-size:13px;font-weight:600;padding:7px 14px;cursor:pointer;color:var(--muted)}
.avail .seg button.on{background:var(--green-bg);color:var(--green)}
.avail .seg button.on.away{background:#eee9e0;color:var(--muted)}
.lobby-link{color:var(--blue);font-weight:600;font-size:13.5px;cursor:pointer;background:none;border:none;font-family:inherit}
.lobby-link:hover{text-decoration:underline}
.lobby-spacer{flex:1}
.room-sec{margin-top:22px}
.room-sec-h{font-size:15px;font-weight:700;color:var(--ink);margin:0 0 10px}
.st{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.st.ready{background:var(--green-bg);color:var(--green)}
.st.entering{background:#e6eef5;color:var(--ink-2)}
.st.await{background:#fdf6e3;color:var(--amber)}
.start-cta{background:#f7faff;border:1px solid #cfdcf0;border-radius:12px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:6px}
.start-cta .t{font-weight:700;font-size:15px}
.start-cta .s{font-size:13px;color:var(--muted);margin-top:2px}
.lobby-empty{text-align:center;padding:48px 24px}
.lobby-empty .h{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:6px}
.lobby-empty .s{color:var(--muted);font-size:14px;max-width:480px;margin:0 auto}
.fb{display:inline-flex;align-items:center;gap:6px}
.fb .cur{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.fb .cur.Yes{background:var(--green-bg);color:var(--green)}
.fb .cur.No{background:#fcebeb;color:#a32d2d}
.fb .cur.Maybe{background:#fdf6e3;color:var(--amber)}
.fb .cur.No-show{background:#eee9e0;color:var(--muted)}
.linkbtns{display:flex;gap:14px;flex-wrap:wrap}
.linkbtns a{color:var(--blue);font-size:13px;font-weight:600;cursor:pointer}
.tinylink{color:var(--blue);font-size:12.5px;cursor:pointer}
.proposed{font-size:12.5px;color:var(--amber);font-weight:600}
/* video test modal */
.vt-preview{background:#1a1a1a;border-radius:12px;height:240px;display:flex;align-items:center;justify-content:center;color:#8ba0b3;font-size:13px;margin-bottom:16px;position:relative;overflow:hidden}
.vt-preview .cam{width:84px;height:84px;border-radius:50%;background:#2f4a60;display:flex;align-items:center;justify-content:center;font-size:30px;color:#cbd9e5;font-family:'Noto Sans'}
.vt-row{display:flex;gap:14px;margin-bottom:14px}.vt-row>div{flex:1}
.bg-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:8px}
.bg-swatch{width:100%;aspect-ratio:1;border-radius:8px;border:2px solid transparent;cursor:pointer}
.bg-swatch.sel{border-color:var(--blue)}
.bg-swatch.none{background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted)}
.chk-row{display:flex;align-items:center;gap:10px;font-size:14px;margin:8px 0}
.net-note{background:#fdf6e3;border:1px solid #f0e2b8;border-radius:10px;padding:12px 14px;font-size:13px;color:#5a4a1a;line-height:1.5;margin-top:10px}
.modal.wide{max-width:560px}
.rec-opts{display:flex;gap:10px;margin:6px 0}
.rec-opts label{flex:1;border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;font-weight:600;font-size:14px;cursor:pointer}
.rec-opts input{display:none}
.rec-opts label:has(input:checked){border-color:var(--blue);background:#f5f8ff;color:var(--blue)}

/* ===== Lobby exact (from lobby-v3) ===== */
.ltabs-wrap{border-bottom:3px solid #d4d2d0;margin-top:4px}
.ltabs{display:flex}
.ltab{flex:1 1 0;padding:20px 16px;text-align:center;font-size:16px;font-weight:400;color:#595959;cursor:pointer;border:none;border-bottom:4px solid transparent;margin-bottom:-3px;background:none;font-family:inherit}
.ltab:hover{color:#2d2d2d}
.ltab.active{color:#2d2d2d;border-bottom-color:#2d2d2d;font-weight:700}
.lpanel{background:#f3f2ef;padding:24px 0 0}
.status-card{background:#fff;border-radius:16px;padding:32px 36px;display:flex;align-items:center;justify-content:space-between;gap:24px;border:1px solid #b0aeab}
.status-card-text h3{font-size:24px;font-weight:700;color:#2d2d2d;margin-bottom:6px}
.status-card-text p{font-size:16px;font-weight:400;color:#595959;line-height:1.5;margin:0}
.status-card-illustration{flex-shrink:0;width:140px;height:100px}
.prep-card{background:#fff;border-radius:16px;overflow:hidden;margin-top:24px}
.prep-card-header{padding:32px 36px 0;font-size:22px;font-weight:800;color:#2d2d2d}
.prep-row{display:flex;align-items:center;gap:24px;padding:28px 36px;border-bottom:1px solid #ebebeb}
.prep-row:last-child{border-bottom:none}
.prep-illustration{flex-shrink:0;width:120px;height:90px}
.prep-text{flex:1 1 0}
.prep-title{font-size:16px;font-weight:700;color:#2d2d2d}
.prep-desc{font-size:14px;color:#767676;margin-top:4px}
.prep-action{display:inline-block;font-size:16px;color:#0044b3;font-weight:700;cursor:pointer;white-space:nowrap;padding:10px 20px;border:2px solid #0044b3;border-radius:8px;background:#fff}
.prep-action:hover{background:#f0f5ff}
.lcard{background:#fff;border-radius:16px;border:1px solid #ebebeb;padding:24px 28px;margin-bottom:18px}
.lcard .room-sec-h{margin:0 0 14px}

/* ===== Lobby header controls (dots menu + status dropdown), exact from lobby-v3 ===== */
.iv-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:6px}
.iv-actions{display:flex;align-items:center;gap:12px;flex-shrink:0}
.preview-center{display:flex;justify-content:center;margin:2px 0 14px}
.bpill.sm{padding:5px 6px}
.bpill.sm .bn{height:22px;min-width:22px;padding:0 9px;font-size:12px}
.bpill.sm .bl{font-size:10px;padding:0 6px}
.dots-btn{width:40px;height:40px;border-radius:8px;border:1px solid #d4d2d0;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;position:relative;padding:0}
.dots-btn:hover{background:#f3f2ef;border-color:#0044b3}
.dots-btn svg{width:20px;height:20px}
.dots-menu{position:absolute;top:46px;right:0;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);border:1px solid #d4d2d0;min-width:300px;z-index:500;display:none;padding:8px 0}
.dots-menu.open{display:block}
.dots-menu-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px 24px;font-size:16px;font-weight:400;color:#2d2d2d;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;transition:background .1s;white-space:nowrap}
.dots-menu-item:hover{background:#f3f2ef}
.dots-menu-item .external-icon{width:16px;height:16px;color:#595959;flex-shrink:0}
.status-dropdown-wrap{position:relative;flex-shrink:0}
.status-dropdown-btn{display:flex;align-items:center;gap:6px;padding:9px 15px;border-radius:8px;border:2px solid #0044b3;background:#fff;cursor:pointer;font-family:inherit;font-size:14px;transition:.15s}
.status-dropdown-btn .status-label{color:#595959;font-weight:400}
.status-dropdown-btn .status-dot,.status-dropdown-option .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:#16a34a}
.status-dot.away{background:#999}
.status-dropdown-btn .status-value{font-weight:700;color:#0044b3}
.status-dropdown-btn .status-value.away{color:#595959}
.status-chevron{width:14px;height:14px;color:#595959;transition:transform .15s}
.status-dropdown-btn.open .status-chevron{transform:rotate(180deg)}
.status-dropdown-menu{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);border:1px solid #d4d2d0;min-width:180px;z-index:500;display:none;padding:4px 0}
.status-dropdown-menu.open{display:block}
.status-dropdown-option{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;font-size:15px;font-weight:700;color:#2d2d2d;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit}
.status-dropdown-option:hover,.status-dropdown-option.selected{background:#f3f2ef}
.status-dropdown-option .status-check{width:16px;color:#2d2d2d;font-size:16px;text-align:center;flex-shrink:0}

/* ===== v2: conversational create + messaging settings ===== */
.chat-hero{max-width:720px;margin:7vh auto 0;text-align:center}
.chat-hero h1{font-size:32px;font-weight:700;color:var(--ink);margin-bottom:8px}
.chat-hero .sub{color:var(--muted);font-size:15px;margin-bottom:26px}
.chat-box{position:relative;background:#fff;border:2px solid #a8a8a8;border-radius:16px;padding:16px 18px 52px;text-align:left;transition:border-color .12s}
.chat-box:focus-within{border-color:var(--blue)}
.chat-box textarea{width:100%;border:none;outline:none;resize:none;font-family:inherit;font-size:16px;min-height:54px;color:var(--text);background:transparent}
.chat-send{position:absolute;right:14px;bottom:14px}
.chat-chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:18px}
.chat-chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:8px 16px;font-size:14px;cursor:pointer;color:var(--text)}
.chat-chip:hover{border-color:var(--blue);color:var(--blue)}
.draft-hero{max-width:560px;margin:16vh auto 0;text-align:center;color:var(--muted);font-size:15px}
.review-head{font-size:26px;font-weight:700;color:var(--ink);margin:2px 0 4px}
.rev-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 24px;margin-bottom:16px}
.rev-card h3{font-size:14px;font-weight:700;color:var(--ink);margin:0 0 14px;text-transform:uppercase;letter-spacing:.04em}
.msg-toggle{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px solid var(--line-soft)}
.msg-toggle:last-child{border-bottom:none}
.msg-toggle .mt-t{font-size:14px;font-weight:600}
.msg-toggle .mt-s{font-size:12.5px;color:var(--muted);margin-top:1px}
.mode-opts{display:flex;gap:12px}
.mode-opt{flex:1;border:2px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer}
.mode-opt.sel{border-color:var(--blue);background:#f5f8ff}
.mode-opt .mo-t{font-weight:700;font-size:14px}
.mode-opt .mo-s{font-size:12.5px;color:var(--muted);margin-top:3px}

  function get(){let s=sessionStorage.getItem(KEY);if(!s){const d=seed();sessionStorage.setItem(KEY,JSON.stringify(d));return d;}return JSON.parse(s);}

  function reset(){sessionStorage.removeItem(KEY);}
  /* ---- plan & free-unlock (account-wide) ---- */
  function plan(){return get().plan||'free';}
  function freeLimit(){return get().freeLimit||5;}
  function unlocks(){return get().unlocks||[];}
  function unlocksUsed(){return unlocks().length;}
  function unlocksLeft(){return Math.max(0,freeLimit()-unlocksUsed());}
  function isPaid(){return plan()!=='free';}
  function isUnlocked(cid){return isPaid()||unlocks().indexOf(cid)>-1;}
  function canUnlock(){return isPaid()||unlocksUsed()<freeLimit();}
  function unlock(cid){const st=get();st.unlocks=st.unlocks||[];if(st.unlocks.indexOf(cid)>-1)return true;if(!isPaid()&&st.unlocks.length>=(st.freeLimit||5))return false;st.unlocks.push(cid);save(st);return true;}

  function candidate(aid,cid){return (agent(aid).candidates||[]).find(c=>c.id===cid);}

  function add(a){const s=get();s.agents.push(a);save(s);return a;}
  function qs(k){return new URLSearchParams(location.search).get(k);}
  function esc(t){return (t==null?'':String(t)).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function ini(n){return n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
  /* next best action for an agent */
  function nudge(a){
    if(a.awaiting>0)return {text:`${a.awaiting} candidate${a.awaiting>1?'s are':' is'} waiting on your response`,sub:'Replying within 24h keeps show-rates high',label:`Review ${a.awaiting}`,target:`interview-room.html?a=${a.id}`,tone:'accent'};

  function allActivity(){

  function stats(){
