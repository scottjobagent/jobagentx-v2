<!DOCTYPE html>
<!-- interview-agent build 1 -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobAgentX — Interview Agent</title>
<style>
:root{
 --bg:#0d0e12; --panel:#141620; --card:#171a24; --card2:#1d2130; --raise:#232838;
 --line:#272c3a; --line2:#20242f;
 --ink:#f4f5f8; --ink2:#c9cedb; --muted:#8b91a3; --faint:#5b6072;
 --accent:#7c8cff; --accent2:#9a7bff; --accent-soft:rgba(124,140,255,.14); --accent-ink:#b9c2ff;
 --great:#34d399; --good:#38bdf8; --okay:#fbbf24; --poor:#f87171;
 --mascot-face:#3a4090; --r:10px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,system-ui,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#2c3242;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* layout */
.app{display:flex;min-height:100vh}
.side{width:230px;flex:0 0 230px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:9px;padding:16px 16px 12px}
.brand .mk{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.brand .nm{font-weight:600;font-size:14px}
.brand .nm span{color:var(--accent)}
.emp{margin:4px 12px 10px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px;cursor:pointer}
.emp .elg{width:22px;height:22px;border-radius:6px;background:#2a5f52;color:#cff5e6;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex:0 0 22px}
.emp .et{font-size:12.5px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.emp .ec{margin-left:auto;color:var(--faint);width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.nav{padding:6px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1}
.nav .sec{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding:12px 8px 5px}
.nav a{display:flex;align-items:center;gap:11px;padding:8px 9px;border-radius:8px;color:var(--ink2);font-size:13px;font-weight:500;cursor:pointer}
.nav a svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.7;flex:0 0 17px}
.nav a:hover{background:var(--card)}
.nav a.on{background:var(--accent-soft);color:var(--accent-ink)}
.nav a .cnt{margin-left:auto;font-size:11px;font-weight:600;color:var(--faint);background:var(--card2);border-radius:20px;padding:1px 7px}
.nav a.on .cnt{background:rgba(124,140,255,.2);color:var(--accent-ink)}
.nav a .live{margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.04em;color:var(--great);display:flex;align-items:center;gap:4px}
.nav a .live:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--great);box-shadow:0 0 0 3px rgba(52,211,153,.18)}
.side-foot{border-top:1px solid var(--line);padding:11px 14px;display:flex;align-items:center;gap:9px}
.side-foot .av{width:26px;height:26px;border-radius:50%;background:#3a4055;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}
.side-foot .u{min-width:0}
.side-foot .un{font-size:12px;font-weight:500}
.side-foot .ue{font-size:11px;color:var(--faint)}

/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(13,14,18,.86);backdrop-filter:blur(8px);z-index:8}
.top h1{margin:0;font-size:15px;font-weight:600}
.top .rolepick{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:500;cursor:pointer}
.top .rolepick .rd{width:7px;height:7px;border-radius:50%;background:var(--great)}
.top .rolepick svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2}
.top .sp{flex:1}
.credits{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:6px 12px;font-size:12.5px;cursor:pointer}
.credits b{color:var(--accent-ink);font-weight:600}
.credits svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:1.8}
.iconbtn{width:32px;height:32px;border-radius:8px;background:var(--card);border:1px solid var(--line);color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.wrap{padding:24px 26px 60px;max-width:1200px}

/* ask bar (chatbot) */
.askbar{display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:22px}
.askbar .sp2{width:18px;height:18px;fill:url(#agrad);flex:0 0 18px}
.askbar input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:13.5px;font-family:inherit}
.askbar input::placeholder{color:var(--muted)}
.askbar .go{width:28px;height:28px;border-radius:8px;background:var(--accent);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.askbar .go svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2}

/* mascot dark */
.imx{filter:drop-shadow(0 0 22px rgba(124,140,255,.35))}
.imx .r{fill:var(--accent)}
.imx-ring{transform-box:fill-box;transform-origin:center;animation:imspin 22s linear infinite}
@keyframes imspin{to{transform:rotate(360deg)}}
.imx-ray{animation:impulse 1.9s ease-in-out infinite}
@keyframes impulse{0%,100%{opacity:.25}50%{opacity:.95}}
.imx-face{animation:imbob 3.6s ease-in-out infinite}
@keyframes imbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.imx-eye{transform-box:fill-box;transform-origin:center;animation:imblink 4.8s ease-in-out infinite}
@keyframes imblink{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.12)}}
@media(prefers-reduced-motion:reduce){.imx-ring,.imx-ray,.imx-face,.imx-eye{animation:none}}

/* command center */
.hero{display:flex;align-items:center;gap:22px;background:radial-gradient(120% 140% at 12% 0%,rgba(124,140,255,.10),transparent 60%),var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 26px;margin-bottom:20px}
.hero-ic{width:96px;height:96px;flex:0 0 96px;display:flex;align-items:center;justify-content:center}
.hero-tx h2{margin:0 0 6px;font-size:20px;font-weight:600}
.hero-tx p{margin:0;font-size:13.5px;color:var(--muted);max-width:560px}
.hero-tx .st{display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-size:12px;font-weight:600;color:var(--great);background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);border-radius:20px;padding:4px 11px}
.hero-tx .st:before{content:"";width:7px;height:7px;border-radius:50%;background:var(--great);box-shadow:0 0 0 3px rgba(52,211,153,.2)}
.hero-cta{margin-left:auto;display:flex;flex-direction:column;gap:9px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn:hover{filter:brightness(1.08)}
.btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2}
.btn.ghost{background:var(--card2);color:var(--ink2);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--raise);filter:none}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 17px}
.kpi .kl{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
.kpi .kl svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.kpi .kv{font-size:26px;font-weight:600;margin-top:8px;letter-spacing:-.01em}
.kpi .kd{font-size:11.5px;margin-top:3px;color:var(--faint)}
.kpi .kd.up{color:var(--great)}

.sech{display:flex;align-items:center;margin:26px 0 13px}
.sech h3{margin:0;font-size:15px;font-weight:600}
.sech .lk{margin-left:auto;font-size:12.5px;color:var(--accent-ink);cursor:pointer;font-weight:500}

.roles{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.role{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:17px 18px;cursor:pointer;transition:border-color .12s}
.role:hover{border-color:#3a4considerate}
.role:hover{border-color:#39405a}
.role-h{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.role-ic{width:34px;height:34px;border-radius:9px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;flex:0 0 34px}
.role-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.7}
.role-nm{font-size:14px;font-weight:600}
.role-sub{font-size:12px;color:var(--muted);margin-top:1px}
.role-live{margin-left:auto;font-size:10px;font-weight:700;color:var(--great);display:flex;align-items:center;gap:5px}
.role-live:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--great);box-shadow:0 0 0 3px rgba(52,211,153,.18)}
.role-live.paused{color:var(--okay)}
.role-live.paused:before{background:var(--okay);box-shadow:0 0 0 3px rgba(251,191,36,.15)}
.role-stats{display:flex;gap:22px}
.role-stats>div b{font-size:17px;font-weight:600}
.role-stats>div span{display:block;font-size:11px;color:var(--faint);margin-top:1px}
.role-foot{margin-top:14px;padding-top:13px;border-top:1px solid var(--line2);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
.role-foot svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:1.8}

/* fit grade pill */
.grade{display:inline-flex;align-items:center;gap:6px;border-radius:7px;padding:4px 9px;font-size:11.5px;font-weight:600;white-space:nowrap}
.grade svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.4}
.grade.great{background:rgba(52,211,153,.12);color:var(--great)}
.grade.good{background:rgba(56,189,248,.12);color:var(--good)}
.grade.okay{background:rgba(251,191,36,.13);color:var(--okay)}
.grade.poor{background:rgba(248,113,113,.12);color:var(--poor)}

/* candidate cards (interview queue) */
.qhead{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.qhead .qt{font-size:15px;font-weight:600}
.qhead .qbadge{font-size:11px;font-weight:600;color:var(--accent-ink);background:var(--accent-soft);border-radius:20px;padding:2px 9px}
.qtabs{display:flex;gap:4px;margin-left:auto;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:3px}
.qtab{padding:6px 12px;border-radius:7px;font-size:12.5px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit}
.qtab.on{background:var(--card2);color:var(--ink)}
.qlist{display:flex;flex-direction:column;gap:12px}
.icard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;transition:border-color .12s,box-shadow .12s}
.icard:hover{border-color:#39405a}
.ic-h{display:flex;align-items:flex-start;gap:13px}
.ic-av{width:46px;height:46px;flex:0 0 46px;border-radius:50%;color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center}
.ic-id{flex:1;min-width:0}
.ic-nm{font-size:15.5px;font-weight:600;cursor:pointer;display:inline-block}
.ic-nm:hover{color:var(--accent-ink)}
.ic-meta{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:6px;font-size:12.5px;color:var(--muted)}
.ic-meta .m{display:flex;align-items:center;gap:6px}
.ic-meta .m svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7;color:var(--faint)}
.ic-meta .m b{color:var(--ink2);font-weight:500}
.ic-acts{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.iabtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card2);color:var(--ink2);border-radius:8px;padding:8px 13px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:inherit}
.iabtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.iabtn:hover{background:var(--raise)}
.iabtn.accept{background:var(--accent);border-color:var(--accent);color:#fff}
.iabtn.accept:hover{filter:brightness(1.08)}
.iabtn.decline{color:var(--poor)}
.iabtn.decline:hover{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.3)}
.ic-why{margin-top:14px;padding-top:14px;border-top:1px solid var(--line2);display:flex;gap:10px}
.ic-why .sp{width:16px;height:16px;flex:0 0 16px;fill:var(--accent2);margin-top:1px}
.ic-why .wt{font-size:12.5px;color:var(--ink2);line-height:1.55}
.ic-why .wt b{color:var(--ink);font-weight:600}
.ic-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
.ic-tag{font-size:11px;color:var(--ink2);background:var(--card2);border:1px solid var(--line);border-radius:6px;padding:3px 9px}

/* slide-out */
.dov{position:fixed;inset:0;background:rgba(4,6,12,.5);z-index:60;display:none;justify-content:flex-end}
.dov.open{display:flex}
.dpanel{width:min(900px,82vw);height:100%;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;transform:translateX(26px);opacity:0;transition:transform .2s,opacity .2s}
.dov.open .dpanel{transform:translateX(0);opacity:1}
.dtop{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--line)}
.dnav{display:flex;gap:6px}
.dnavb{width:28px;height:28px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.dnavb svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.dtopr{display:flex;align-items:center;gap:8px}
.dclose{width:28px;height:28px;border:none;background:var(--card);border-radius:7px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.dclose svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.dhd{display:flex;align-items:flex-start;gap:14px;padding:20px 24px 16px}
.dav{width:54px;height:54px;flex:0 0 54px;border-radius:50%;color:#fff;font-size:17px;font-weight:600;display:flex;align-items:center;justify-content:center}
.dnmrow{display:flex;align-items:center;gap:11px}
.dnm{font-size:19px;font-weight:600}
.dloc{font-size:13px;color:var(--muted);margin-top:4px}
.dacts{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;max-width:420px}
.dbody{flex:1;overflow-y:auto;padding:2px 24px 20px}
.dsec{padding:18px 0;border-top:1px solid var(--line2)}
.dlbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-bottom:11px}
.dq{display:flex;gap:9px;margin-bottom:9px}
.dqic{width:15px;height:15px;flex:0 0 15px;fill:var(--accent2);margin-top:2px}
.dqq{font-size:13px;font-weight:500;color:var(--accent-ink)}
.dqa{font-size:13px;color:var(--muted);margin-top:2px}
.dcr{font-size:13px;color:var(--ink2);margin-bottom:7px}
.dck{width:14px;height:14px;stroke:var(--great);fill:none;stroke-width:2.4;vertical-align:-2px;margin-right:7px}
.dchips{display:flex;flex-wrap:wrap;gap:8px}
.dchip{font-size:12px;color:var(--ink2);background:var(--card);border:1px solid var(--line);border-radius:7px;padding:5px 10px}
.dco{display:flex;align-items:flex-start;gap:11px;margin-bottom:12px}
.dcolg{width:34px;height:34px;flex:0 0 34px;border-radius:8px;color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center}
.dconm{font-size:14px;font-weight:600}
.dcometa{font-size:12.5px;color:var(--muted);margin-top:3px}
.drole{display:flex;gap:12px;padding-left:4px}
.ddot{width:9px;height:9px;flex:0 0 9px;border-radius:50%;border:2px solid var(--faint);margin-top:4px}
.drn{font-size:13px;font-weight:500}
.drd{font-size:12.5px;color:var(--faint);margin-top:2px}
.dfoot{display:flex;gap:10px;padding:14px 24px;border-top:1px solid var(--line)}
.dfb{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--card);color:var(--ink2);border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.dfb svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.dfb.pri{background:var(--accent);border-color:var(--accent);color:#fff}

/* generic table + reports + sequence */
.panel{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:0;overflow:hidden}
.rowh{display:grid;padding:12px 18px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--line2)}
.trow{display:grid;padding:15px 18px;align-items:center;border-bottom:1px solid var(--line2);font-size:13px}
.trow:last-child{border-bottom:none}
.repgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.repcard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 17px}
.repcard .rt{font-size:13.5px;font-weight:600}
.repcard .rs{font-size:11.5px;color:var(--muted);margin-top:2px}
.repcard .rv{font-size:24px;font-weight:600;margin-top:12px}
.spark{height:40px;margin-top:10px;display:flex;align-items:flex-end;gap:3px}
.spark i{flex:1;background:linear-gradient(180deg,var(--accent),rgba(124,140,255,.25));border-radius:2px 2px 0 0;display:block}
.seq{display:flex;gap:18px}
.seq-steps{width:300px;flex:0 0 300px;display:flex;flex-direction:column;gap:10px}
.seqstep{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer}
.seqstep.on{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.seqstep .si{width:30px;height:30px;border-radius:8px;background:var(--card2);color:var(--accent-ink);display:flex;align-items:center;justify-content:center;flex:0 0 30px}
.seqstep .si svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7}
.seqstep .sn{font-size:13px;font-weight:500}
.seqstep .sd{font-size:11.5px;color:var(--muted);margin-top:1px}
.seqstep .sday{margin-left:auto;font-size:11px;color:var(--faint);white-space:nowrap}
.seq-detail{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:18px 20px}
.msgline{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line2)}
.msgline:last-child{border-bottom:none}
.msg-av{width:38px;height:38px;flex:0 0 38px;border-radius:50%;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
.msg-nm{font-size:13.5px;font-weight:500}
.msg-role{font-size:12px;color:var(--accent-ink);margin-top:1px}
.msg-prev{font-size:12.5px;color:var(--muted);margin-top:3px}
.msg-t{margin-left:auto;font-size:11.5px;color:var(--faint)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty h3{color:var(--ink);font-size:16px;margin:14px 0 6px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);background:#0b0d13;border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:200;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;box-shadow:0 12px 40px rgba(0,0,0,.5)}

var SPARK_ICON='';
function pgMessaging(){
 var unread=MSG_THREADS.filter(function(t){return t.unread;}).length;
 var list=MSG_THREADS.map(function(t,i){
   var last=t.msgs[t.msgs.length-1];
   var pv=(last.who==='them'?'':(last.who==='auto'?'Agent: ':'You: '))+last.t;
   return '<div class="ibx-row'+(i===MSG_SEL?' on':'')+'" onclick="msgOpen('+i+')"><span class="ibx-av" style="background:'+t.c+'">'+t.ini+'</span><div class="ibx-meta"><div class="ibx-nm">'+t.name+'<span class="t">'+t.date+'</span></div><div class="ibx-rl">'+t.role+'</div><div class="ibx-pv">'+pv+'</div></div>'+(t.unread?'<span class="ibx-un"></span>':'')+'</div>';
 }).join('');
 var right;
 if(MSG_SEL==null||!MSG_THREADS[MSG_SEL]){
   right='<div class="thr"><div class="thr-empty"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><div style="font-weight:600;color:var(--ink)">Select a conversation</div><div>Choose a candidate from your inbox to view and reply.</div></div></div>';
 } else {
   var t=MSG_THREADS[MSG_SEL];
   var body=t.msgs.map(function(m){
     if(m.who==='them') return '<div class="mrow in"><div class="col"><div class="bub">'+m.t+'</div><div class="mtime">'+m.time+'</div></div></div>';
     if(m.who==='auto') return '<div class="mrow out auto"><div class="col"><div class="btag"><svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>Outreach Agent · sent automatically</div><div class="bub">'+m.t+'</div><div class="mtime">'+m.time+'</div></div></div>';
     return '<div class="mrow out"><div class="col"><div class="bub">'+m.t+'</div><div class="mtime">'+m.time+'</div></div></div>';
   }).join('');
   right='<div class="thr"><div class="thr-h"><div class="thr-nm">'+t.name+'</div><div class="thr-sub"><span class="rl">'+t.role+'</span><span>·</span><span>'+t.loc+'</span></div></div><div class="thr-body"><div class="thr-day">'+t.date+'</div>'+body+'</div><div class="thr-comp"><input id="msgInput" placeholder="Type a message…" onkeydown="msgKey(event)" autocomplete="off"><button class="thr-send" onclick="msgSend()"><svg viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4z"/></svg></button></div></div>';
 }
 return '<div class="inbox"><div class="ibx-list"><div class="ibx-lh"><h2>Messages</h2><div class="ibx-tabs"><div class="ibx-tab on">Inbox'+(unread?'<span class="n">'+unread+'</span>':'')+'</div><div class="ibx-tab" onclick="agToast(\'No archived conversations\')">Archived</div></div></div><div class="ibx-scroll">'+list+'</div></div>'+right+'</div>';
}

/* ===== Reports ===== */
function spark(seed){var h='';for(var i=0;i<12;i++){var v=30+((Math.sin(i*seed)+1)*30)+(i*2);h+='<i style="height:'+Math.min(100,v)+'%"></i>';}return '<div class="spark">'+h+'</div>';}
function pgReports(){
 var cards=[['Interviews Scheduled','Weekly, across all roles','218','1.3'],['Accept Rate','Delivered candidates you accepted','90%','2.1'],['Time to Interview','Request → booked interview','1.4d','1.7'],['No-Show Rate','Recovered by Outreach Agent','6%','0.9'],['Candidates Delivered','Interview-ready, by your agent','512','1.5'],['Interviews Delivered','This billing period','340','2.4']];
 return '<div class="hero" style="padding:20px 24px"><div class="hero-tx"><h2 style="font-size:18px">Reports, trends &amp; alerts</h2><p>Track what your Interview Agent is delivering — scheduled interviews, accept rate, time-to-interview, no-shows, and interview usage. Build custom reports or get notified when something changes.</p></div><div class="hero-cta"><button class="btn" onclick="agToast(\'New report\')"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>New report</button></div></div>'
 +askbar('Ask for a report — e.g. “accept rate by role over the last 30 days”')
 +'<div class="sech"><h3>Created by your agent</h3></div><div class="repgrid">'+cards.map(function(c,i){return '<div class="repcard"><div class="rt">'+c[0]+'</div><div class="rs">'+c[1]+'</div><div class="rv">'+c[2]+'</div>'+spark(parseFloat(c[3]))+'</div>';}).join('')+'</div>';
}
function pgSettings(){return '<div class="hero" style="padding:20px 24px"><div class="hero-tx"><h2 style="font-size:18px">Role &amp; agent settings</h2><p>Connect your calendar, set your interview availability and how many slots to open, and tune the criteria your agent matches on.</p></div></div>'
 +'<div class="repgrid" style="grid-template-columns:1fr 1fr"><div class="repcard"><div class="rt">Calendar &amp; availability</div><div class="rs" style="margin-bottom:12px">Connect a calendar and set the windows your agent can book into.</div><button class="btn ghost" onclick="agToast(\'Connect Google Calendar\')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Connect calendar</button><div style="margin-top:12px;font-size:12.5px;color:var(--muted)">Open <b style="color:var(--ink)">6 interview slots/day</b> · Mon–Fri · 9am–4pm CT</div></div><div class="repcard"><div class="rt">Matching criteria</div><div class="rs" style="margin-bottom:12px">What your agent qualifies candidates on before delivering them.</div><div class="dchips"><span class="dchip">ICU / ER experience</span><span class="dchip">BLS &amp; ACLS</span><span class="dchip">Night shift</span><span class="dchip">TX license</span><span class="dchip">EPIC / Cerner</span></div></div></div>';
}

 +'<div class="dhd"><div class="dav" style="background:'+c.color+'">'+c.initials+'</div><div style="flex:1"><div class="dnmrow"><div class="dnm">'+c.name+'</div>'+gr(c.grade)+'</div><div class="dloc">'+c.loc+'</div><div style="display:flex;align-items:center;gap:12px;margin-top:9px">'+_li()+'<button class="dfb" style="padding:6px 11px" onclick="agToast(\'Email revealed\')"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>Show Email</button></div></div>'
 +'<div class="dacts"><button class="dfb" onclick="commentModal('+i+')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Comment</button><button class="dfb" onclick="rescheduleModal('+i+')"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Reschedule</button><button class="dfb" onclick="declineModal('+i+')" style="color:var(--poor)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m15 9-6 6M9 9l6 6"/></svg>Decline</button><button class="dfb pri" onclick="acceptCand('+i+')"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Accept</button></div></div>'
 +'<div class="dbody">'
 +'<div class="dsec" style="border-top:none"><div class="dlbl">Requested interview</div><div style="font-size:14px;color:var(--ink)"><b>'+c.req+'</b> · wants '+c.job+' · '+c.loc+'</div></div>'
 +'<div class="dsec"><div class="dlbl">Why your agent matched them</div><div style="font-size:13px;color:var(--ink2);line-height:1.6">'+c.why+'</div></div>'
 +'<div class="dsec"><div class="dlbl">Screening</div>'+evals+'</div>'
 +'<div class="dsec"><div class="dlbl">Criteria met</div>'+crit+'</div>'

 +'<div class="dsec"><div class="dlbl">Work Experience</div><div class="dco"><span class="dcolg" style="background:'+c.curColor+'">'+c.curInit+'</span><div><div class="dconm">'+c.curCo+' <span style="font-size:11px;font-weight:500;color:var(--accent-ink);background:var(--accent-soft);border-radius:5px;padding:2px 7px;margin-left:4px">'+c.companyTag+'</span></div><div class="dcometa">'+c.company[0]+' · '+c.company[1]+' · '+c.company[2]+'</div></div></div><div class="drole"><span class="ddot" style="border-color:var(--muted)"></span><div><div class="drn">'+c.curRole+'</div><div class="drd">'+c.curDates+'</div></div></div><div class="dlbl" style="margin:16px 0 10px">Past</div>'+past+'</div>'

 +'</div>'
 +'<div class="dfoot"><button class="dfb pri" onclick="acceptCand('+i+')"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Accept interview</button><button class="dfb" onclick="rescheduleModal('+i+')">Reschedule</button><button class="dfb" onclick="agToast(\'Message '+c.name.replace(/’/g,"")+'\')"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Message</button></div>';
}
function openDrawer(i){DI=i;var ov=document.getElementById('dov');document.getElementById('dpanel').innerHTML=drawer(i);ov.classList.add('open');}

/* ===== modals ===== */
function openModal(html){document.getElementById('modal').innerHTML='<button class="mx" onclick="closeModal()"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg></button>'+html;document.getElementById('mov').classList.add('open');}

/* ===== upgrade modal ===== */
var UP_CORE=['Unlimited active roles','Unlimited team seats','AI matching & fit grading','Outreach Agent + shared inbox','Reports & trends'];
var UPLANS=[
 {name:'Starter',mo:299,ivs:10,feats:UP_CORE},
 {name:'Growth',mo:699,ivs:30,pop:true,feats:UP_CORE},
 {name:'Scale',mo:1799,ivs:90,feats:UP_CORE},
 {name:'Enterprise',mo:null,ivs:null,feats:['h:Everything in Scale, plus','SSO / SAML','ATS + API integration','Dedicated success manager','Custom volume & SLA']}
];
var UP_CUR='Growth';
var UP_BILL='mo';
var UP_MULT={mo:1,qt:0.9,yr:0.8};
function upTick(f){return '<svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>';}
function renderUpTiers(){
 var m=UP_MULT[UP_BILL];
 var curIdx=UPLANS.map(function(p){return p.name;}).indexOf(UP_CUR);
 document.getElementById('upTiers').innerHTML=UPLANS.map(function(p,idx){
  var isCur=p.name===UP_CUR;
  var price = p.mo==null ? '<div class="pr"><span class="a" style="font-size:19px">Custom</span></div>' : '<div class="pr"><span class="a">$'+Math.round(p.mo*m).toLocaleString()+'</span><span class="pp">/mo</span></div>';
  var cr = p.mo==null ? 'Custom volume, tailored to your hiring.' : '<b>'+p.ivs+'</b> interviews / month';
  var tag = isCur?'<span class="up-tag c">CURRENT PLAN</span>':(p.pop?'<span class="up-tag p">MOST POPULAR</span>':'');
  var btn;
  if(isCur){btn='<button class="ub iscur">Current plan</button>';}
  else if(p.mo==null){btn='<button class="ub" onclick="agToast(\'Contact sales — we’ll tailor volume + terms\')">Contact sales</button>';}
  else {var verb=idx>curIdx?'Upgrade to ':'Switch to ';btn='<button class="ub" onclick="closeModal();agToast(\''+verb.trim()+'ed to '+p.name+' — '+p.ivs+' interviews/mo\')">'+verb+p.name+'</button>';}
  var feats=p.feats.map(function(x){ if(x.indexOf('h:')===0)return '<li class="h">'+x.slice(2)+'</li>'; return '<li>'+upTick()+x+'</li>'; }).join('');
  return '<div class="up-c'+(isCur?' cur':(p.pop?' pop':''))+'">'+tag+'<div class="n">'+p.name+'</div>'+price+'<div class="cr">'+cr+'</div>'+btn+(p.name==='Enterprise'?'<ul>'+feats+'</ul>':'')+'</div>';
 }).join('');
}
function setUpBill(b){UP_BILL=b;var seg=document.getElementById('upSeg');if(seg){[].forEach.call(seg.querySelectorAll('button'),function(x){x.classList.toggle('on',x.getAttribute('data-b')===b);});}renderUpTiers();}

 var seg='<div class="up-seg" id="upSeg"><button data-b="mo" class="on" onclick="setUpBill(\'mo\')">Monthly</button><button data-b="qt" onclick="setUpBill(\'qt\')">Quarterly<span class="sv">-10%</span></button><button data-b="yr" onclick="setUpBill(\'yr\')">Annual<span class="sv">-20%</span></button></div>';

 UP_BILL='mo';

 mo.classList.add('up');
 mo.innerHTML=html;
 renderUpTiers();
 document.getElementById('mov').classList.add('open');

renderNav();go('Dashboard');
